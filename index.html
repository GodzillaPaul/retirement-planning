  <style>
/* ═══ Base ═══ */
* { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; box-sizing: border-box; }
input[type=number]::-webkit-inner-spin-button { opacity: 1; }

/* 安全區 iPhone 瀏海/圓角 */
.safe-pad { padding: max(1rem, env(safe-area-inset-top)) max(0.5rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(0.5rem, env(safe-area-inset-left)); }

/* 防止 iOS 輸入框自動放大 */
input, select { font-size: 16px !important; -webkit-appearance: none; }

/* 按鈕觸控回饋 */
button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.tap-btn:active { opacity: 0.75; transform: scale(0.98); transition: all 0.1s; }

/* 捲動順暢 */
body { -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; margin: 0; }

/* ═══ 固定寬度縮放策略（所有裝置同版面）═══ */

/* 外層：撐滿螢幕，overflow 隱藏，不做置中（由 scaleWrap 的 translateX 控制） */
#input-outer, #report-outer {
  width: 100%;
  overflow-x: hidden;
}

/* 輸入頁：固定 480px，從左上角縮放 */
#input-wrap {
  width: 480px;
  transform-origin: top left;
}

/* 報告頁：固定 780px，從左上角縮放 */
#report-wrap {
  width: 780px;
  transform-origin: top left;
}

/* 蘭亭黑-繁 特黑 */
@font-face {
  font-family: 'LantingHei';
  src: local('LantingHei-Black'), local('蘭亭黑-繁 特黑'), local('HanHei SC'), local('PingFang TC'),
       local('Noto Sans TC');
  font-weight: 900;
}
.lantin {
  font-family: 'LantingHei', 'PingFang TC', 'Heiti TC', 'Apple LiGothic', 'Noto Sans TC', sans-serif;
  font-weight: 900;
  color: #2d2d2d;
  letter-spacing: 0.04em;
}

@keyframes spin { to { transform: rotate(360deg); } }

@media print {
  .no-print { display: none !important; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
  #report-wrap { transform: none !important; margin-bottom: 0 !important; }
}

// ═══ engine.js — 純運算邏輯 ═══

// 保額自動計算（回傳萬元，無條件進位到萬）
function calcSA(g, age, ap) {
  const t = g === "M" ? SA_M : SA_F;
  const [lo, hi] = t[Math.max(0, Math.min(70, age))] || [10, 10];
  const avg = (lo + hi) / 2;
  const raw = Math.min(60000000, avg * ap);
  return Math.ceil(raw / 10000); // 回傳萬元單位
}

// 保單帳戶逐月模擬（甲型 UNDA）
function simulate(p) {
  const coi = p.gender === "M" ? COI_MALE : COI_FEMALE;
  const months = Math.min(p.paymentYears * 12, (110 - p.currentAge) * 12);
  const res = [];
  let av = 0, cum = 0;
  const mr = Math.pow(1 + p.assumedReturn, 1 / 12) - 1;

  for (let m = 0; m < months; m++) {
    const yr = Math.floor(m / 12) + 1, mo = (m % 12) + 1, age = p.currentAge + yr - 1;
    const tp = mo === 1 ? p.annualTarget : 0, ep = p.monthlyExtra;
    const fr = FFT[Math.min(yr, 6)] || 0;
    const fee = Math.round(tp * fr) + Math.round(ep * FFE);
    cum += tp + ep;
    const adm = av > 0 || (tp + ep - fee) > 0 ? ADM : 0;

    // Step 1: avMid = 期初AV + 投入 - 前置費用 - 管理費
    const avMid = av + tp + ep - fee - adm;

    // Step 2: COI 用 avMid 計算危險保額（不是期初 AV）
    const coiRate = coi[Math.min(age, 110)] || 1;
    const coiCost = Math.round(Math.max(p.sumInsured - avMid, 0) * coiRate);

    // Step 3: 期末AV = MAX(avMid - COI, 0) × (1 + 月報酬率)
    av = Math.max(avMid - coiCost, 0) * (1 + mr);

    if (mo === 12 || m === months - 1) {
      const avRound = Math.round(av);
      // 甲型（UNDA）：身故保障 = MAX(保額, 帳戶價值)
      const db = Math.max(p.sumInsured, avRound);
      res.push({ year: yr, age, av: avRound, db, sv: avRound, cum: Math.round(cum) });
    }
  }
  return res;
}

// 數字格式化
const fmt = n => n == null ? "-" : Math.round(n).toLocaleString("zh-TW");

// 目標搜尋：找出最低每月存入金額使退休解約金 >= capDist
function goalSeek(S, capDist) {
  const workYears = S.retirementAge - S.currentAge;
  const payYears = workYears + 1;
  const ar = S.assumedReturn / 100;

  function trySV(totalMonthly) {
    const ms = Math.min(MAX_MS, totalMonthly);
    const me = Math.max(0, Math.round((totalMonthly - ms) / 500) * 500);
    const at = ms * 12;
    const sw = calcSA(S.gender, S.currentAge, at);
    const si = sw * 10000;
    const res = simulate({
      currentAge: S.currentAge, retirementAge: S.retirementAge, gender: S.gender,
      annualTarget: at, monthlyExtra: me, assumedReturn: ar, paymentYears: payYears, sumInsured: si
    });
    const idx = Math.min(workYears, (res?.length || 1) - 1);
    return { sv: res[idx]?.sv || 0, ms, me, at, sw, si, res };
  }

  // 二分搜尋
  let lo = 500, hi = 200000, best = hi;
  for (let i = 0; i < 30; i++) {
    const mid = Math.round((lo + hi) / 2 / 500) * 500;
    if (mid <= lo) break;
    if (trySV(mid).sv >= capDist) { best = mid; hi = mid; }
    else lo = mid;
  }
  // 微調
  while (best > 500) {
    if (trySV(best - 500).sv >= capDist) best -= 500;
    else break;
  }

  return trySV(best);
}

// 完整計算：整合所有衍生值
function compute(S) {
  const workYears = S.retirementAge - S.currentAge;
  const retireYears = S.lifeExpectancy - S.retirementAge;
  const payYears = workYears + 1;
  const totalNeed = S.monthlyExpense * retireYears * 12;
  const selfAnnual = workYears > 0 ? totalNeed / workYears : 0;
  const selfMonthly = selfAnnual / 12;
  const distRate = 0.0468, distNav = 7.83;
  const preparedMonthly = S.preparedAmount * 0.07 / 12;
  const netMonthlyExpense = Math.max(0, S.monthlyExpense - preparedMonthly);
  const capDist = netMonthlyExpense * 12 / 0.07;

  const ac = goalSeek(S, capDist);
  const ri = Math.min(workYears, (ac.res?.length || 1) - 1);
  const svR = ac.res[ri]?.sv || 0;
  const units = svR / distNav;
  const monthDist = svR * 0.07 / 12;
  const policyAnnual = ac.at + ac.me * 12;
  const policyMonthly = policyAnnual / 12;
  const expW = S.monthlyExpense / 10000;
  const needW = Math.round(totalNeed / 10000);
  const capW = Math.round(capDist / 10000);

  return {
    workYears, retireYears, payYears, totalNeed, selfAnnual, selfMonthly,
    capDist, preparedMonthly, netMonthlyExpense,
    monthlySaving: ac.ms, monthlyExtra: ac.me, annualTarget: ac.at,
    saWan: ac.sw, sa: ac.si, opt: ac.res, ri, svR, units, monthDist,
    policyAnnual, policyMonthly, expW, needW, capW, distRate, distNav
  };
}

// ═══ ui-renderer.js — 畫面渲染與事件綁定 ═══

function getAvatar(S) {
  return S.clientPhoto || (S.gender === "M" ? DEFAULT_MALE : DEFAULT_FEMALE);
}

// 統一縮放：固定寬度容器適應任何螢幕，並確保置中
function scaleWrap(id, designWidth) {
  const el = document.getElementById(id);
  if (!el) return;
  const vw = Math.min(window.innerWidth, document.documentElement.clientWidth);
  const scale = Math.min(1, (vw - 16) / designWidth);
  // translateX 補正：scale 後寬度縮小，需往右移讓它置中
  const offset = (vw - designWidth * scale) / 2;
  el.style.transform = `translateX(${offset}px) scale(${scale})`;
  el.style.marginBottom = `${(scale - 1) * el.offsetHeight}px`;
}

// ═══ export-service.js — PDF 匯出邏輯 ═══

async function exportPDF(S) {
  const btn = document.getElementById("btnPDF");
  const label = document.getElementById("pdfLabel");
  const icon = document.getElementById("pdfIcon");
  if (btn.disabled) return;
  btn.disabled = true;
  label.textContent = "產生中…";
  icon.innerHTML = '<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="31.4" stroke-dashoffset="10" style="animation:spin 1s linear infinite"/>';

  // 隱藏按鈕列
  const noPrint = document.querySelectorAll(".no-print");
  noPrint.forEach(el => el.style.display = "none");

  try {
    const { jsPDF } = window.jspdf;
    const PDF_W = 210, PDF_H = 297, MARGIN = 8;
    const contentW = PDF_W - MARGIN * 2;
    const contentH = PDF_H - MARGIN * 2;

    // 截圖前：移除 transform（含 translateX），還原原始位置
    const wrapEl = document.getElementById("report-wrap");
    const prevTransform = wrapEl.style.transform;
    const prevMargin = wrapEl.style.marginBottom;
    wrapEl.style.transform = "none";
    wrapEl.style.marginBottom = "0";
    await new Promise(r => setTimeout(r, 80));

    const canvas = await html2canvas(wrapEl, {
      scale: 2, useCORS: true, allowTaint: true,
      backgroundColor: "#ffffff", logging: false,
      windowWidth: 780, width: 780,
      scrollX: 0, scrollY: -wrapEl.getBoundingClientRect().top
    });

    // 還原 scale
    wrapEl.style.transform = prevTransform;
    wrapEl.style.marginBottom = prevMargin;

    // 等比縮放
    const ratio = canvas.width / canvas.height;
    let imgW = contentW;
    let imgH = imgW / ratio;
    if (imgH > contentH) { imgH = contentH; imgW = imgH * ratio; }

    const x = MARGIN + (contentW - imgW) / 2;
    const y = MARGIN + (contentH - imgH) / 2;

    const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
    pdf.addImage(canvas.toDataURL("image/jpeg", 0.93), "JPEG", x, y, imgW, imgH);

    const name = (S.clientName || "客戶").replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, "");
    pdf.save("退休財務計畫書_" + name + ".pdf");

    label.textContent = "儲存為 PDF";
    icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>';
  } catch (e) {
    label.textContent = "請重試";
    console.error(e);
  } finally {
    noPrint.forEach(el => el.style.display = "");
    btn.disabled = false;
  }
}

const S = {
  page: "input", clientName: "", clientPhoto: null,
  gender: "M", currentAge: 22, retirementAge: 65,
  monthlyExpense: 30000, lifeExpectancy: 85,

  const app = document.getElementById("app");
  if (S.page === "input") {
    const page = renderInputPage(S, render, () => { S.page = "report"; render(); });
    app.innerHTML = page.html;
    page.bind();
  } else {
    const page = renderReportPage(S, () => { S.page = "input"; render(); }, exportPDF);
    app.innerHTML = page.html;
    page.bind();
  }
}

render();

window.addEventListener("resize", () => {

  else scaleWrap("report-wrap", 780);
});
